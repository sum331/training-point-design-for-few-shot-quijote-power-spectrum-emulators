project_root: .
device: auto
device_ids: [0]

sampling:
  initial_sobol_points: 64
  iterations: 64
  batch_size: 1

representation:
  anchor_mode: hmcode2020
  transform_family: logdiff

grids:
  k_min: 0.01
  k_max: 3.0
  low_k_max: 0.07
  mid_k_max: 0.5
  low_k_fraction: 0.1
  mid_k_fraction: 0.35
  high_k_fraction: 0.55
  high_k_min: 0.5
  high_k_max: 3.0
  k_eval_size: 10000
  k_work_size: 10000

dynamic_preprocessing:
  update_k_grid: false
  weight_gamma: 0.7
  weight_rho: 0.25
  weight_min: 1.0e-8
  weight_max: 1.8
  band_weight_balance_mode: core_posterior_variance
  core_band_indices: [1, 2, 3]
  core_error_good: 0.0035
  core_error_bad: 0.006
  core_gate_floor: 0.15
  core_gate_ceiling: 0.85
  core_priority: [0.30, 1.35, 1.30, 1.05]
  release_priority: [0.45, 1.25, 1.20, 1.10]
  error_signal_eta: 0.25
  posterior_variance_probe_size: 512
  posterior_variance_seed_offset: 9173
  posterior_variance_gamma: 0.5
  posterior_variance_eta: 0.35
  band_weight_prior: [0.30, 1.35, 1.30, 1.05]
  weight_prior_eta: 0.35

m3:
  coverage_mode: hull_domain_hybrid
  domain_support_point_count: 384
  domain_top_k: 256
  domain_score_scale: 1.0
  representation_band_weights: [0.30, 1.35, 1.30, 1.05]
  band_weight_min: 1.0e-8
  acquisition_density_weight_power: 0.5
  acquisition_density_weight_floor: 0.15
  imse_rerank_top_k: 256
  imse_probe_count: 512
  imse_probe_seed_offset: 27183
  imse_rerank_mode: p68_soft
  acquisition_p68_set_rerank_top_k: 256
  acquisition_p68_set_rerank_score_ratio: 0.995
  acquisition_p68_set_rerank_risk_mode: validation_probe_shell
  acquisition_p68_set_rerank_band_weights: [0.30, 1.35, 1.30, 1.05]
  acquisition_p68_set_rerank_acq_weight: 1.0
  acquisition_p68_set_rerank_p68_weight: 1.0
  acquisition_p68_set_rerank_spacefill_weight: 0.25
  acquisition_p68_set_rerank_boundary_weight: 0.30
  acquisition_p68_set_rerank_boundary_threshold: 0.08
  acquisition_p68_set_rerank_boundary_target_fraction: 0.15
  acquisition_p68_validation_probe_size: 256
  acquisition_p68_validation_probe_focus_k_min: 0.01
  acquisition_p68_validation_probe_focus_k_max: 3.0
  acquisition_p68_validation_probe_shell_width: 0.15
  acquisition_p68_validation_probe_min_weight: 0.05
  repr_dirichlet_probe_count: 8
  stage0_chunk_size: 6144
  hierarchical_stage1_refine_fraction: 0.25
  hierarchical_stage2_refine_fraction: 1.0
  hierarchical_stage2_starts_per_simplex_refine: 8
  stage3_refine_fraction: 0.03
  polish_starts_per_simplex_refine: 48
  stage3_qmc_top_k: 0
  stage3_qmc_sample_count: 4096
  stage3_qmc_chunk_size: 7168
  chunk_size: 6144

# This config intentionally keeps the repository's default CAMB 8D theta_bounds
# untouched. Quijote's 5D parameter space is isolated under extensions.quijote.
extensions:
  quijote:
    enabled: true
    parameter_space: quijote_bsq5
    parameter_space_variant: quijote_bsq5_tight10_k001_3
    cache_prefix: quijote_bsq5_tight10_k001_3
    theta_names:
      - Omega_m
      - Omega_b
      - h
      - n_s
      - sigma_8
    theta_bounds:
      Omega_m: [0.14, 0.46]
      Omega_b: [0.026, 0.074]
      h: [0.54, 0.86]
      n_s: [0.84, 1.16]
      sigma_8: [0.64, 0.96]
    runtime_cache_root: artifacts/quijote/runtime_cache_tight10_k001_3
    raw_root: artifacts/quijote/raw/Pk/matter/BSQ
    params_file: artifacts/quijote/raw/BSQ_params.txt
    power_file_name: Pk_CDM_z=0.000.dat
    bank_path: data/source_data/raw_bank/artifacts/quijote/cache/quijote_bsq_z0_bank.npz
    bank_metadata_path: data/source_data/raw_bank/artifacts/quijote/cache/quijote_bsq_z0_bank.json
    bank_manifest_path: data/source_data/raw_bank/artifacts/quijote/cache/quijote_bsq_z0_bank_manifest.csv
    surrogate_path: data/source_data/v2_quijote/artifacts/quijote/gp_surrogates/quijote_bsq_z0_full_directlogpk_truth_generator.pkl
